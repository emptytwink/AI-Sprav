<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Документы круга</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/view.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
<header class="view-header">
    <a href="javascript:history.back()" class="back-button">Назад</a>
    <div class="circle-info">
        Документы узла <span id="circle-label" class="circle-label"></span>
    </div>
    <button id="upload-toggle" class="primary-btn" type="button">Добавить файл</button>
</header>

<div class="canvas-shell">
    <div id="map"></div>
    <div id="map-empty-hint" class="map-empty-hint hidden">Полотно пустое. Добавьте файл для круга.</div>
</div>

<section class="files-section">
    <h3 class="files-title">Файлы круга <span id="circle-label-2"></span></h3>
    <div id="files-list" class="files-list"></div>
</section>

<div id="upload-panel" class="upload-panel hidden">
    <form id="upload-form">
        <input type="hidden" name="circle_id" value="{{ circle_id }}">
        <input type="hidden" name="drawing_id" value="{{ drawing_id }}">
        <input type="hidden" name="project" value="{{ project }}">

        <label for="upload-input" class="file-input-label">Выбрать файлы</label>
        <input id="upload-input" type="file" name="files" multiple>
        <button type="button" id="upload-submit" class="primary-btn">Загрузить</button>
    </form>
</div>

<script src="{{ url_for('static', filename='js/view.js') }}"></script>
</body>
</html>
